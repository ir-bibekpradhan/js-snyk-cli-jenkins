name: SNYK xasd InvisiRisk

on:
  workflow_dispatch:

permissions:
  checks: write
  contents: write
  packages: read
  actions: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    name: Sync fork and Run build

    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          app_token: ${{ secrets.IR_API_KEY }}
          debug: true
      # ============= InvisiRisk Setup End =============

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Build Docker Image
        run: |
          docker build --no-cache \
            -t my-app:latest \
            --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest \
            --secret id=pse-ca,src=${PSE_CA_CERT_PATH} \
            --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 \
            .

      - name: Extract archive from Docker image
        run: |
          container_id=$(docker create my-app:latest)
          docker cp "$container_id:/app/archive.zip" ./archive.zip
          docker rm "$container_id"
          ls -lh archive.zip

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive
          path: archive.zip
          if-no-files-found: error
